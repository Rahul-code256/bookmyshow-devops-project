apiVersion: apps/v1

kind: Deployment


metadata:

  name: payment-service

  namespace: bookmyshow



spec:


  replicas: 2



  selector:


    matchLabels:


      app: payment-service




  template:



    metadata:


      labels:


        app: payment-service




    spec:



      containers:



      - name: payment-service



        image: 397059225608.dkr.ecr.ap-south-1.amazonaws.com/payment-service:latest



        ports:



        - containerPort: 8083





        resources:



          requests:



            memory: "512Mi"



            cpu: "250m"





          limits:



            memory: "1Gi"



            cpu: "500m"





        livenessProbe:



          httpGet:



            path: /actuator/health



            port: 8083





          initialDelaySeconds: 40



          periodSeconds: 10






        readinessProbe:



          httpGet:



            path: /actuator/health



            port: 8083





          initialDelaySeconds: 40



          periodSeconds: 10
