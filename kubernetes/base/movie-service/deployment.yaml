apiVersion: apps/v1
kind: Deployment

metadata:
  name: movie-service
  namespace: bookmyshow

spec:

  replicas: 2

  selector:
    matchLabels:
      app: movie-service


  template:

    metadata:
      labels:
        app: movie-service


    spec:

      containers:

      - name: movie-service

        image: 397059225608.dkr.ecr.ap-south-1.amazonaws.com/movie-service:latest

        ports:

        - containerPort: 8081


        resources:

          requests:

            memory: "512Mi"

            cpu: "250m"


          limits:

            memory: "1Gi"

            cpu: "500m"


        livenessProbe:

          httpGet:

            path: /actuator/health

            port: 8081


          initialDelaySeconds: 40

          periodSeconds: 10


        readinessProbe:

          httpGet:

            path: /actuator/health

            port: 8081


          initialDelaySeconds: 40

          periodSeconds: 10
