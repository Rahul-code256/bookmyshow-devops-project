apiVersion: apps/v1
kind: Deployment

metadata:
  name: booking-service
  namespace: bookmyshow


spec:

  replicas: 2


  selector:

    matchLabels:

      app: booking-service



  template:


    metadata:

      labels:

        app: booking-service



    spec:


      containers:


      - name: booking-service


        image: 397059225608.dkr.ecr.ap-south-1.amazonaws.com/booking-service:latest


        ports:


        - containerPort: 8082



        resources:


          requests:

            memory: "512Mi"

            cpu: "250m"



          limits:

            memory: "1Gi"

            cpu: "500m"



        livenessProbe:


          httpGet:


            path: /actuator/health

            port: 8082



          initialDelaySeconds: 40

          periodSeconds: 10




        readinessProbe:


          httpGet:


            path: /actuator/health

            port: 8082



          initialDelaySeconds: 40

          periodSeconds: 10
