apiVersion: apps/v1

kind: Deployment


metadata:

  name: notification-service

  namespace: bookmyshow



spec:


  replicas: 2



  selector:


    matchLabels:


      app: notification-service




  template:



    metadata:


      labels:


        app: notification-service




    spec:



      containers:



      - name: notification-service



        image: 397059225608.dkr.ecr.ap-south-1.amazonaws.com/notification-service:latest



        ports:



        - containerPort: 8085





        resources:



          requests:



            memory: "512Mi"



            cpu: "250m"





          limits:



            memory: "1Gi"



            cpu: "500m"





        livenessProbe:



          httpGet:



            path: /actuator/health



            port: 8085





          initialDelaySeconds: 40



          periodSeconds: 10





        readinessProbe:



          httpGet:



            path: /actuator/health



            port: 8085





          initialDelaySeconds: 40



          periodSeconds: 10
